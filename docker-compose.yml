services:
  postgres:
    image: postgres:16
    container_name: crypto-mvp-postgres
    environment:
      POSTGRES_DB: crypto_mvp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  collector:
    build:
      context: .
    command: python -m apps.collector.main
    env_file:
      - .env
    depends_on:
      - postgres
    restart: unless-stopped
    volumes:
      - ./:/app

volumes:
  postgres_data: